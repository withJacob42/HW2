name: Build and Push Docker Image

on:
  push:
    branches:
      - '**' # 모든 브랜치에 대한 Push마다 트리거됩니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            redmin42/food-app:latest
            redmin42/food-app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull, Stop, Remove, and Run Docker Container
        run: |
          docker pull redmin42/food-app:latest
          docker stop food-app || true
          docker rm food-app || true
          docker run -d --name food-app -p 8000:8000 --restart unless-stopped redmin42/food-app:latest

